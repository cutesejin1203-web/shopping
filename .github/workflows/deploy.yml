name: 🚀 백엔드 CI/CD 자동 배포

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 💡 포인트: steps가 벽에서 떨어져서 안쪽으로 쏙 들어와 있지? 이게 핵심이야!
    steps:
    - name: 🛎️ 1. 저장소 코드 가져오기 (v4 업그레이드 완료)
      uses: actions/checkout@v4

    - name: ☕ 2. 자바(JDK) 21 세팅 (자바 21 맞춤형!)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: 🐘 3. Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 🔨 4. 백엔드 프로젝트 빌드 (테스트 생략)
      run: ./gradlew clean build -x test

    - name: 🚚 5. GCP 서버로 빌드된 JAR 파일 전송 (로켓 배송!)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        source: "build/libs/*SNAPSHOT.jar"
        target: "app/"
        strip_components: 2

    - name: 🔄 6. GCP 서버에서 배포 스크립트 실행
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          cd ~/app
          chmod +x deploy.sh
          ./deploy.sh