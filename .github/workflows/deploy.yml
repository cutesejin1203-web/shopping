name: 🚀 백엔드 CI/CD 자동 배포

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🛎️ 1. 저장소 코드 가져오기 (v4 업그레이드 완료)
      uses: actions/checkout@v4

    - name: ☕ 2. 자바(JDK) 21 세팅 (자바 21 맞춤형!)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: 🐘 3. Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 🔨 4. 백엔드 프로젝트 빌드 (테스트 생략)
      run: ./gradlew clean build -x test

    - name: 🚚 5. GCP 서버로 빌드된 JAR 파일 전송 (로켓 배송!)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        source: "build/libs/*SNAPSHOT.jar"
        target: "app/"
        strip_components: 2

    - name: 🔄 6. GCP 서버에서 배포 스크립트 실행 및 환경변수 주입
      uses: appleboy/ssh-action@master
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORTONE_API_KEY: ${{ secrets.PORTONE_API_KEY }}
        PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
        # 🚀 1. 깃허브 금고에서 Base64 문자열 꺼내기
        GCP_KEY_JSON: ${{ secrets.GCP_KEY_JSON }}
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        # 🚀 2. SSH 접속할 때 서버로 같이 들고 들어가기
        envs: DB_PASSWORD, JWT_SECRET, PORTONE_API_KEY, PORTONE_API_SECRET, GCP_KEY_JSON
        script: |
          cd ~/app
          
          # 💡 [삭제] 더 이상 gcp-key.json 파일을 서버에 만들지 않음! (보안 최고)
          
          # 🚀 3. deploy.sh가 읽을 수 있도록 메모리에 환경 변수 띄우기
          export DB_PASSWORD=$DB_PASSWORD
          export JWT_SECRET=$JWT_SECRET
          export PORTONE_API_KEY=$PORTONE_API_KEY
          export PORTONE_API_SECRET=$PORTONE_API_SECRET
          export GCP_KEY_JSON=$GCP_KEY_JSON # 💡 application.yml의 구멍으로 쏙 들어감!
          
          # 기존 배포 스크립트 실행
          chmod +x deploy.sh
          ./deploy.sh